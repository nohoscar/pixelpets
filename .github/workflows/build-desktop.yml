name: Build Desktop App

# Cuándo se dispara:
# - Cada vez que pusheas a la rama `main`
# - Cada vez que creas un tag `v*` (ej: v1.0.0) -> publica una Release
# - Manualmente desde la pestaña Actions de GitHub
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            artifact: PixelPets-win32-x64
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact: PixelPets-darwin-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: PixelPets-linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npx vite build

      - name: Prepare Electron app
        shell: bash
        run: |
          rm -rf electron-package
          mkdir -p electron-package

          # Copy Electron files
          cp electron/main.cjs electron-package/
          cp electron/pet.html electron-package/
          cp electron/pet-renderer.js electron-package/
          cp electron/package.json electron-package/

          # The Electron pet overlay uses pet.html (standalone, no React build needed).
          # The panel window needs the built React app.
          # TanStack Start SSR build puts assets in dist/client/ but no index.html,
          # so we generate a minimal one that loads the assets.
          mkdir -p electron-package/dist/client

          # Copy built client assets
          if [ -d "dist/client" ]; then
            cp -R dist/client/* electron-package/dist/client/ 2>/dev/null || true
          fi

          # Find the main JS and CSS bundles
          MAIN_JS=$(ls dist/client/assets/index-*.js 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          MAIN_CSS=$(ls dist/client/assets/styles-*.css 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          # Generate index.html for the Electron panel window
          cat > electron-package/dist/client/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>PixelPets</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap" />
            ${MAIN_CSS:+<link rel="stylesheet" href="./assets/$MAIN_CSS" />}
          </head>
          <body>
            <div id="root"></div>
            ${MAIN_JS:+<script type="module" src="./assets/$MAIN_JS"></script>}
          </body>
          </html>
          HTMLEOF

      - name: Package Electron app
        run: |
          npx @electron/packager electron-package "PixelPets" \
            --platform=${{ matrix.platform }} \
            --arch=${{ matrix.arch }} \
            --out=electron-release \
            --overwrite \
            --asar \
            --prune=false
        shell: bash

      - name: Compress build (Windows / Linux)
        if: matrix.os != 'macos-latest'
        run: |
          cd electron-release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip -mx=9 "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          else
            tar czf "../${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi
        shell: bash

      - name: Compress build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd electron-release
          zip -r -9 "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      # Si pusheaste un tag tipo v1.0.0, además crea una Release pública
      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
