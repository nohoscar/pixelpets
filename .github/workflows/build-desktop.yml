name: Build Desktop App

# Cuándo se dispara:
# - Cada vez que pusheas a la rama `main`
# - Cada vez que creas un tag `v*` (ej: v1.0.0) -> publica una Release
# - Manualmente desde la pestaña Actions de GitHub
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            artifact: PixelPets-win32-x64
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact: PixelPets-darwin-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: PixelPets-linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npx vite build

      - name: Build pet overlay bundle
        run: npx vite build --config electron/vite.pet.config.ts

      - name: Build panel bundle
        run: npx vite build --config electron/vite.panel.config.ts

      - name: Prepare Electron app
        shell: bash
        run: |
          rm -rf electron-package
          mkdir -p electron-package/pet-dist
          mkdir -p electron-package/panel-dist

          # Copy Electron files
          cp electron/main.cjs electron-package/
          cp electron/preload.cjs electron-package/
          cp electron/pet.html electron-package/
          cp electron/package.json electron-package/

          # Copy the pet overlay bundle
          cp electron/pet-dist/pet-bundle.js electron-package/pet-dist/

          # Copy the panel build
          cp -R electron/panel-dist/* electron-package/panel-dist/

      - name: Package Electron app
        run: |
          npx @electron/packager electron-package "PixelPets" \
            --platform=${{ matrix.platform }} \
            --arch=${{ matrix.arch }} \
            --out=electron-release \
            --overwrite \
            --asar \
            --prune=false
        shell: bash

      - name: Compress build (Windows / Linux)
        if: matrix.os != 'macos-latest'
        run: |
          cd electron-release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip -mx=9 "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          else
            tar czf "../${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi
        shell: bash

      - name: Compress build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd electron-release
          zip -r -9 "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      # Si pusheaste un tag tipo v1.0.0, además crea una Release pública
      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
